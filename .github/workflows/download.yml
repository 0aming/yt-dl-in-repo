name: Download Youtube videos from urls.txt

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install yt-dlp, ffmpeg, aria2
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg aria2
          sudo curl -L -o /usr/local/bin/yt-dlp https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp
          sudo chmod +x /usr/local/bin/yt-dlp

      - name: Decode YouTube cookies from secret
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" | base64 -d > cookies.txt

      - name: Download videos
        run: |
          mkdir -p downloads temp_downloads
          while read -r line; do
            [ -z "$line" ] && continue
            echo "$line" | grep -q '^#' && continue
            url=$(echo "$line" | awk '{print $1}')
            quality=$(echo "$line" | awk '{print $2}')
            [ -z "$quality" ] && quality="best"
            case "$quality" in
              360) format="bestvideo[height<=360]+bestaudio/best[height<=360]" ;;
              480) format="bestvideo[height<=480]+bestaudio/best[height<=480]" ;;
              720) format="bestvideo[height<=720]+bestaudio/best[height<=720]" ;;
              1080) format="bestvideo[height<=1080]+bestaudio/best[height<=1080]" ;;
              *) format="bestvideo+bestaudio/best" ;;
            esac
            yt-dlp -f "$format" --external-downloader aria2c --cookies cookies.txt -o "temp_downloads/%(title)s_%(id)s.%(ext)s" "$url"
          done < urls.txt

      - name: Split large files (>90MB)
        run: |
          LIMIT=$((90 * 1024 * 1024))
          for FILE in temp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            BASENAME=$(basename "$FILE")
            if [ "$SIZE" -gt "$LIMIT" ]; then
              zip -s 90m "downloads/${BASENAME}.zip" "$FILE"
            else
              cp "$FILE" "downloads/$BASENAME"
            fi
          done
          rm -rf temp_downloads cookies.txt

      - name: Push to repo
        run: |
          if [ -z "$(ls -A downloads 2>/dev/null)" ]; then
            echo "No files downloaded."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "add youtube videos from urls.txt [skip ci]" || echo "nothing new"
          git push
